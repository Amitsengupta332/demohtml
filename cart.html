<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Caveat:wght@600&display=swap"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <title>Cart - ClS Security</title>
</head>

<body class="bg-[#f4f5f7] font-[Poppins]">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Spacer because navbar is absolute -->
  <div class="h-[120px]"></div>

  <!-- Breadcrumb -->
  <div class="bg-white border-y">
    <div class="max-w-[1270px] mx-auto px-6 py-4 text-sm">
      <a href="index.html" class="text-black">CLS-Computer</a>
      <span class="mx-2 text-gray-500">›</span>
      <span class="text-gray-500">Warenkorb</span>
    </div>
  </div>

  <!-- Cart Page -->
  <main class="max-w-[1270px] mx-auto px-6 py-4">
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_410px] gap-0">

      <!-- Cart Table -->
      <section class="bg-white">
        <div class="bg-[#078b94] text-white text-center py-3">
          <h1 class="text-2xl font-bold">Warenkorb</h1>
        </div>

        <!-- Table Header -->
        <div class="hidden md:grid grid-cols-[2fr_1fr_1fr_1fr_80px] bg-[#3f3f3f] text-white font-semibold">
          <div class="px-4 py-4">Produkt</div>
          <div class="px-4 py-4 text-center">Preis</div>
          <div class="px-4 py-4 text-center">Menge</div>
          <div class="px-4 py-4 text-center">Preis</div>
          <div class="px-4 py-4 text-center">Aktion</div>
        </div>

        <!-- Cart Items -->
        <div id="cartPageItems">
          <!-- JS will render items here -->
        </div>
      </section>

      <!-- Summary -->
      <aside class="bg-white shadow-xl">
        <div class="bg-[#3f3f3f] text-white px-5 py-4">
          <h2 class="text-xl font-bold">Zusammenfassung</h2>
        </div>

        <div class="p-5">
          <div class="flex items-center justify-between border-b pb-4 mb-4">
            <p class="text-gray-700">Versandkosten und Steuern schätzen</p>
            <span class="text-xl text-gray-500">⌃</span>
          </div>

          <div class="space-y-4 text-[15px]">
            <div class="flex items-center justify-between border-b pb-3">
              <p class="font-bold">Zwischensumme netto</p>
              <p id="summarySubtotalNet">0,00 €</p>
            </div>

            <div class="flex items-center justify-between border-b pb-3">
              <p class="font-bold">Gesamtsumme netto</p>
              <p id="summaryTotalNet">0,00 €</p>
            </div>

            <div class="flex items-center justify-between border-b pb-3">
              <p class="font-bold">19% MwSt.</p>
              <p id="summaryTax">0,00 €</p>
            </div>

            <div class="flex items-center justify-between border-b pb-4">
              <p class="font-bold">Gesamtsumme brutto</p>
              <p id="summaryTotalGross" class="font-bold">0,00 €</p>
            </div>
          </div>

          <a
            href="checkout.html"
            class="mt-5 block bg-[#078b94] text-white text-center py-4 text-lg font-bold hover:bg-[#067982] transition"
          >
            Gehen Sie zur Kasse
          </a>
        </div>
      </aside>

    </div>
  </main>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    async function loadNavbar() {
      const navbar = await fetch("components/navbar.html");
      document.getElementById("navbar").innerHTML = await navbar.text();

      lucide.createIcons();

      const cartScript = document.createElement("script");
      cartScript.src = "assets/js/cart.js";
      document.body.appendChild(cartScript);
    }

    loadNavbar();
  </script>

  <script src="assets/js/cart-page.js"></script>

</body>
</html>
