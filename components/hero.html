<section class="relative w-full h-screen min-h-[720px] overflow-hidden">

  <div id="slider" class="flex h-full transition-transform duration-700 ease-in-out">

    <!-- SLIDE 1 -->
    <div class="relative w-full h-full flex-shrink-0">
      <img
        src="assets/images/cameras_4k.avif"
        class="slide-img"
        alt="Überwachungskameras"
      >

      <div class="absolute inset-0 flex items-center">
        <div class="ml-[13%] mt-12 max-w-[560px]">

          <h2
            data-key="slide1_title"
            class="script-font text-[46px] lg:text-[56px] leading-none text-gray-500 mb-5"
          >
            Moderne Sicherheitstechnologie
          </h2>

          <h1
            data-key="slide1_product"
            class="text-[54px] lg:text-[72px] font-black leading-[0.95] mb-8 text-black"
          >
            Überwachungskameras
          </h1>

          <a
            data-key="shop"
            href="#"
            class="inline-block bg-[#1d2127] text-white px-10 py-4 text-base font-black tracking-wide hover:bg-black transition-colors duration-300"
          >
            JETZT KAUFEN
          </a>

        </div>
      </div>
    </div>

    <!-- SLIDE 2 -->
    <div class="relative w-full h-full flex-shrink-0">
      <img
        src="assets/images/final_hero_4k.avif"
        class="slide-img"
        alt="Zutrittskontrollsysteme"
      >

      <div class="absolute inset-0 flex items-center">
        <div class="ml-[13%] mt-12 max-w-[620px]">

          <h2
            data-key="slide2_title"
            class="script-font text-[46px] lg:text-[56px] leading-none text-gray-700 mb-5"
          >
            Zutrittskontrollsysteme
          </h2>

          <h1
            data-key="slide2_subtitle"
            class="text-[54px] lg:text-[72px] font-black leading-[0.95] mb-8 text-black"
          >
            Moderne Zugangssicherheit
          </h1>

          <a
            data-key="shop_arrow"
            href="#"
            class="inline-block bg-[#1d2127] text-white px-10 py-4 text-base font-black tracking-wide hover:bg-black transition-colors duration-300"
          >
            JETZT KAUFEN →
          </a>

        </div>
      </div>
    </div>

  </div>

  <!-- ARROWS -->
  <button
    onclick="prevSlide()"
    aria-label="Previous slide"
    class="absolute left-6 top-1/2 -translate-y-1/2 z-50 text-5xl font-light text-black hover:scale-110 transition-transform duration-300"
  >
    ‹
  </button>

  <button
    onclick="nextSlide()"
    aria-label="Next slide"
    class="absolute right-6 top-1/2 -translate-y-1/2 z-50 text-5xl font-light text-black hover:scale-110 transition-transform duration-300"
  >
    ›
  </button>

</section>

<script>
  let currentSlide = 0;
  const slider = document.getElementById("slider");
  const totalSlides = slider.children.length;

  function showSlide(index) {
    if (index < 0) {
      currentSlide = totalSlides - 1;
    } else if (index >= totalSlides) {
      currentSlide = 0;
    } else {
      currentSlide = index;
    }

    slider.style.transform = `translateX(-${currentSlide * 100}%)`;
  }

  function nextSlide() {
    showSlide(currentSlide + 1);
  }

  function prevSlide() {
    showSlide(currentSlide - 1);
  }

  setInterval(nextSlide, 5000);

  const translations = {
    de: {
      slide1_title: "Moderne Sicherheitstechnologie",
      slide1_product: "Überwachungskameras",
      slide2_title: "Zutrittskontrollsysteme",
      slide2_subtitle: "Moderne Zugangssicherheit",
      shop: "JETZT KAUFEN",
      shop_arrow: "JETZT KAUFEN →"
    },
    en: {
      slide1_title: "Modern Security Technology",
      slide1_product: "Surveillance Cameras",
      slide2_title: "Access Control Systems",
      slide2_subtitle: "Modern Access Security",
      shop: "SHOP NOW",
      shop_arrow: "SHOP NOW →"
    }
  };

  function setLanguage(lang) {
    document.querySelectorAll("[data-key]").forEach((el) => {
      const key = el.getAttribute("data-key");

      if (translations[lang][key]) {
        el.innerHTML = translations[lang][key];
      }
    });
  }

  setLanguage("de");
</script>
