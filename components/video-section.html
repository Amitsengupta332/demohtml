<section class="px-8 py-16 bg-white">
  <div class="max-w-[1290px] mx-auto">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 items-center">

      <!-- Left Banner -->
      <div class="h-[245px] bg-[#6f8fa1] overflow-hidden">
        <img
          src="assets/images/mv6pF.jpg"
          alt="Mega Sale"
          class="w-full h-full object-contain block"
        />
      </div>

      <!-- Right Video -->
      <div class="relative h-[245px] overflow-hidden group">

        <video
          id="promoVideo"
          class="w-full h-full object-cover block"
          poster="assets/images/videoframe_6563.png"
        >
          <source src="assets/videos/demo-49.mp4" type="video/mp4">
        </video>

        <!-- Dark overlay -->
        <div id="videoOverlay" class="absolute inset-0 bg-black/20"></div>

        <!-- Play Button -->
        <button
          id="playVideoBtn"
          onclick="playPromoVideo()"
          class="absolute inset-0 m-auto w-24 h-24 rounded-full border-4 border-white flex items-center justify-center bg-white/10 hover:bg-white/20 transition"
        >
          <span class="ml-2 w-0 h-0 border-t-[18px] border-t-transparent border-b-[18px] border-b-transparent border-l-[28px] border-l-white"></span>
        </button>

      </div>

    </div>

  </div>
</section>
