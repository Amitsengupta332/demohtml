<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Caveat:wght@600&display=swap"
    rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <title>Porto Clone</title>
</head>

<body>

  <!-- Components -->
  <div id="navbar"></div>
  <div id="hero"></div>
  <!-- <div id="banner"></div> -->
  <div id="banner2"></div>
  <div id="trainingCalendar"></div>
  <div id="best-sellers"></div>
  <div id="takeMoment"></div>
  <div id="videoSection"></div>
  <div id="faq"></div>
  <div id="footer"></div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    async function loadComponents() {
      const navbar = await fetch("components/navbar.html");
      document.getElementById("navbar").innerHTML = await navbar.text();

      const hero = await fetch("components/hero.html");
      document.getElementById("hero").innerHTML = await hero.text();

      // const banner = await fetch("components/banner-section.html");
      // document.getElementById("banner").innerHTML = await banner.text();

      const banner2 = await fetch("components/banner.html");
      document.getElementById("banner2").innerHTML = await banner2.text();

      const trainingCalendar = await fetch("components/training-calendar.html");
      document.getElementById("trainingCalendar").innerHTML =
        await trainingCalendar.text();


      const bestSellers = await fetch("components/best-sellers.html");
      document.getElementById("best-sellers").innerHTML =
        await bestSellers.text();

      const takeMoment = await fetch("components/take-moment.html");
      document.getElementById("takeMoment").innerHTML =
        await takeMoment.text();

      const videoSection = await fetch("components/video-section.html");
      document.getElementById("videoSection").innerHTML =
        await videoSection.text();


      const faq = await fetch("components/faq.html");
      document.getElementById("faq").innerHTML = await faq.text();

      
      const footer = await fetch("components/footer.html");
      document.getElementById("footer").innerHTML = await footer.text();

      // Icons render AFTER components load
      lucide.createIcons();

      // Extra scripts
      const sliderScript = document.createElement("script");
      sliderScript.src = "assets/js/slider.js";
      document.body.appendChild(sliderScript);

      const cartScript = document.createElement("script");
      cartScript.src = "assets/js/cart.js";
      document.body.appendChild(cartScript);
    }

    loadComponents();
  </script>

</body>

</html>
