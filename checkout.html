<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Caveat:wght@600&display=swap"
    rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <title>Checkout - Porto Clone</title>

  <style>
    .checkout-input {
      width: 100%;
      height: 44px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 0 14px;
      font-size: 13px;
      color: #111827;
      background: #fff;
      outline: none;
      transition: all .2s ease;
    }

    .checkout-input::placeholder {
      color: #9ca3af;
    }

    .checkout-input:focus {
      border-color: #078b94;
      box-shadow: 0 0 0 3px rgba(7, 139, 148, .12);
    }

    .checkout-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 25px rgba(15, 23, 42, .04);
    }

    .checkout-card-title {
      background: linear-gradient(135deg, #080b0d, #1f2933);
      color: #fff;
      padding: 15px 20px;
      font-weight: 800;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .checkout-radio {
      accent-color: #078b94;
    }

    .checkout-checkbox {
      accent-color: #078b94;
    }

    .checkout-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .payment-logo {
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
    }
  </style>
</head>

<body class="bg-[#f8fafc] font-[Poppins] text-[#111827]">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Spacer because navbar is absolute -->
  <div class="h-[115px]"></div>

  <!-- Breadcrumb -->
  <div class="bg-white border-y border-gray-200">
    <div class="max-w-[1270px] mx-auto px-6 py-4 text-sm">
      <a href="index.html" class="text-black font-medium">CLS-Computer</a>
      <span class="mx-2 text-gray-500">›</span>
      <span class="text-gray-500">Kasse</span>
    </div>
  </div>

  <!-- Checkout Page -->
  <main class="max-w-[1270px] mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-[390px_1fr] gap-6 items-start">

      <!-- LEFT COLUMN -->
      <div class="space-y-6">

        <!-- Customer Data -->
        <section class="checkout-card">
          <div class="checkout-card-title">
            <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8" />
              <path d="M4 20c.9-4 4.1-6 8-6s7.1 2 8 6" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" />
            </svg>
            Kundendaten eingeben
          </div>

          <div class="p-5 space-y-4 text-sm">
            <label class="flex items-center gap-3 cursor-pointer">
              <input class="checkout-radio" type="radio" name="accountType" checked />
              <span>Neues Konto erstellen</span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer">
              <input class="checkout-radio" type="radio" name="accountType" />
              <span>Gast-Checkout</span>
            </label>

            <button
              class="inline-flex items-center gap-2 bg-[#078b94] hover:bg-[#067780] text-white px-5 py-3 rounded-md font-bold shadow-sm transition">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
                <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"
                  stroke-linecap="round" />
              </svg>
              Anmelden (Bestandskunde)
            </button>
          </div>
        </section>

        <!-- Billing Address -->
        <section class="checkout-card">
          <div class="checkout-card-title">
            <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 3h7l4 4v14H7V3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
              <path d="M14 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
              <path d="M10 12h6M10 16h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            Rechnungsadresse
          </div>

          <div class="p-5 space-y-3">
            <input class="checkout-input" placeholder="E-Mail Adresse" />

            <select class="checkout-input">
              <option>Herr</option>
              <option>Frau</option>
            </select>

            <input class="checkout-input" placeholder="Vorname" />
            <input class="checkout-input" placeholder="Nachname" />
            <input class="checkout-input" placeholder="Firma" />

            <div class="grid grid-cols-2 gap-3">
              <input class="checkout-input" placeholder="Straße" />
              <input class="checkout-input" placeholder="Hausnummer" />
            </div>

            <select class="checkout-input">
              <option>Region auswählen</option>
            </select>

            <input class="checkout-input" placeholder="Stadt" />
            <input class="checkout-input" placeholder="Postleitzahl" />

            <select class="checkout-input">
              <option>Germany</option>
            </select>

            <input class="checkout-input" placeholder="Telefonnummer" />

            <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer pt-1">
              <input class="checkout-checkbox" type="checkbox" />
              Meine Rechnungs- und Lieferadresse ist identisch
            </label>
          </div>
        </section>

        <!-- Shipping Address -->
        <section class="checkout-card">
          <div class="checkout-card-title">
            <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 8h10v8H3V8Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
              <path d="M13 11h3.5L20 14.5V16h-7v-5Z" stroke="currentColor" stroke-width="1.8"
                stroke-linejoin="round" />
              <path d="M7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
              <path d="M17 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
              <path d="M6 5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            Versandadresse
          </div>

          <div class="p-5 space-y-3">
            <select class="checkout-input">
              <option>Herr</option>
              <option>Frau</option>
            </select>

            <input class="checkout-input" placeholder="Vorname" />
            <input class="checkout-input" placeholder="Nachname" />
            <input class="checkout-input" placeholder="Firma" />

            <div class="grid grid-cols-2 gap-3">
              <input class="checkout-input" placeholder="Straße" />
              <input class="checkout-input" placeholder="Hausnummer" />
            </div>

            <select class="checkout-input">
              <option>Region auswählen</option>
            </select>

            <input class="checkout-input" placeholder="Stadt" />
            <input class="checkout-input" placeholder="Postleitzahl" />

            <select class="checkout-input">
              <option>Germany</option>
            </select>

            <input class="checkout-input" placeholder="Telefonnummer" />
          </div>
        </section>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-6">

        <!-- Top Options -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- Shipping -->
          <section class="checkout-card">
            <div class="checkout-card-title">
              <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 7h11v9H3V7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                <path d="M14 10h3.5L21 13.5V16h-7v-6Z" stroke="currentColor" stroke-width="1.8"
                  stroke-linejoin="round" />
                <path d="M7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
                <path d="M18 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
              </svg>
              Versandart
            </div>

            <div class="p-5 space-y-4 text-sm">
              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="shipping" />
                  Abholung - Abholung&nbsp; 0,00 €
                </span>

                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-[#078b94]"
                  aria-hidden="true">
                  <path d="M4 10h16l-1.5-5h-13L4 10Z" stroke="currentColor" stroke-width="1.8"
                    stroke-linejoin="round" />
                  <path d="M6 10v9h12v-9" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                  <path d="M9 19v-5h6v5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                </svg>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="shipping" />
                  Versand - DHL Paket&nbsp; 6,90 €
                </span>
                <span class="payment-logo text-yellow-500">DHL</span>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="shipping" checked />
                  Versand - UPS&nbsp; 6,90 €
                </span>
                <span class="payment-logo text-[#9a5b1d]">UPS</span>
              </label>
            </div>
          </section>

          <!-- Payment -->
          <section class="checkout-card">
            <div class="checkout-card-title">
              <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8" />
                <path d="M3 9h18" stroke="currentColor" stroke-width="1.8" />
                <path d="M7 15h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
              Zahlungsart
            </div>

            <div class="p-5 space-y-3 text-sm">
              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" />
                  Bar bei Abholung&nbsp; 0,00 €
                </span>
                <span class="text-green-600 font-bold">€</span>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" />
                  Überweisung / Vorkasse&nbsp; 0,00 €
                </span>
                <span class="text-gray-500">🏦</span>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" />
                  Nachnahme&nbsp; 8,00 €
                </span>

                <svg width="21" height="21" viewBox="0 0 24 24" fill="none" class="text-[#078b94]"
                  aria-hidden="true">
                  <path d="M3 7h11v9H3V7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                  <path d="M14 10h3.5L21 13.5V16h-7v-6Z" stroke="currentColor" stroke-width="1.8"
                    stroke-linejoin="round" />
                  <path d="M7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
                  <path d="M18 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.8" />
                </svg>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" checked />
                  Credit Cards&nbsp; 0,00 €
                </span>
                <span class="payment-logo text-blue-700">VISA</span>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" />
                  easyCredit-Ratenkauf&nbsp; 0,00 €
                </span>
                <span class="payment-logo text-blue-500">easyCredit</span>
              </label>

              <label class="flex items-center justify-between gap-3 cursor-pointer">
                <span class="flex items-center gap-3">
                  <input class="checkout-radio" type="radio" name="payment" />
                  PayPal&nbsp; 0,00 €
                </span>
                <span class="payment-logo text-blue-600">PayPal</span>
              </label>
            </div>
          </section>

        </div>

        <!-- Confirm Payment -->
        <section class="checkout-card">
          <div class="checkout-card-title">
            <svg class="checkout-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3 20 6v6c0 5-3.4 8-8 9-4.6-1-8-4-8-9V6l8-3Z" stroke="currentColor"
                stroke-width="1.8" stroke-linejoin="round" />
              <path d="m8.5 12 2.2 2.2 4.8-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
            Zahlung bestätigen
          </div>

          <div
            class="grid grid-cols-[1.7fr_1fr_1fr_1fr] bg-[#e2f3f6] text-[#00596a] text-sm font-bold rounded-t-none">
            <div class="px-5 py-4">Produkt</div>
            <div class="px-5 py-4 text-center">Preis</div>
            <div class="px-5 py-4 text-center">Anzahl</div>
            <div class="px-5 py-4 text-center">Preis</div>
          </div>

          <div id="checkoutItems" class="min-h-[165px] bg-white">
            <!-- JS render -->
          </div>

          <div class="bg-[#f3f4f6] text-sm">
            <div class="flex justify-end items-center gap-8 px-6 py-4 border-b border-gray-200">
              <strong>Zwischensumme netto :</strong>
              <span id="checkoutSubtotalNet" class="font-bold text-[#00596a] min-w-[80px] text-right">0,00 €</span>
            </div>

            <div class="flex justify-end items-center gap-8 px-6 py-4 border-b border-gray-200">
              <strong>Gesamtsumme netto :</strong>
              <span id="checkoutTotalNet" class="font-bold text-[#00596a] min-w-[80px] text-right">0,00 €</span>
            </div>

            <div class="flex justify-end items-center gap-8 px-6 py-4 border-b border-gray-200">
              <strong>19% MwSt. :</strong>
              <span id="checkoutTax" class="font-bold text-[#00596a] min-w-[80px] text-right">0,00 €</span>
            </div>

            <div class="flex justify-end items-center gap-8 px-6 py-4 bg-[#eeeeee]">
              <strong>Gesamtsumme brutto :</strong>
              <span id="checkoutTotalGross" class="font-extrabold text-[#078b94] min-w-[80px] text-right">0,00 €</span>
            </div>
          </div>

          <div class="p-5">
            <div class="flex flex-col sm:flex-row gap-3">
              <input class="checkout-input flex-1" placeholder="Gutscheincode" />
              <button
                class="border border-[#078b94] text-[#00596a] hover:bg-[#078b94] hover:text-white px-7 py-3 rounded-md text-sm font-bold transition">
                Einlösen
              </button>
            </div>
          </div>
        </section>

        <!-- Comment + Terms -->
        <section class="checkout-card p-5 space-y-5">
          <div class="flex items-center gap-2 text-sm text-gray-700">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 6.5A3.5 3.5 0 0 1 7.5 3h9A3.5 3.5 0 0 1 20 6.5v5A3.5 3.5 0 0 1 16.5 15H10l-5 4v-4.8A3.5 3.5 0 0 1 4 11.5v-5Z"
                stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            </svg>
            Kommentar schreiben
          </div>

          <textarea
            class="w-full h-[120px] border border-gray-200 rounded-md p-4 text-sm outline-none focus:border-[#078b94] focus:ring-4 focus:ring-[#078b94]/10 transition resize-y"
            placeholder=""></textarea>

          <div class="space-y-3 text-sm">
            <label class="flex items-start gap-3 cursor-pointer">
              <input class="checkout-checkbox mt-1" type="checkbox" />
              <span>
                Ich habe die <a href="#" class="text-[#078b94] font-medium">AGB</a> gelesen und stimme diesen
                ausdrücklich zu. <span class="text-red-500">*</span>
              </span>
            </label>

            <label class="flex items-start gap-3 cursor-pointer">
              <input class="checkout-checkbox mt-1" type="checkbox" />
              <span>
                Ich habe die <a href="#" class="text-[#078b94] font-medium">Widerrufsbelehrung</a> gelesen.
                <span class="text-red-500">*</span>
              </span>
            </label>
          </div>

          <button
            class="inline-flex items-center justify-center gap-3 bg-[#078b94] hover:bg-[#067780] text-white w-[260px] max-w-full py-4 rounded-md font-extrabold shadow-sm transition">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="5" y="10" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8" />
              <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" />
              <path d="M12 14v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
            Kaufen
          </button>
        </section>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    async function loadCheckoutComponents() {
      const navbar = await fetch("components/navbar.html");
      document.getElementById("navbar").innerHTML = await navbar.text();

      const footer = await fetch("components/footer.html");
      document.getElementById("footer").innerHTML = await footer.text();

      lucide.createIcons();

      const cartScript = document.createElement("script");
      cartScript.src = "assets/js/cart.js";
      document.body.appendChild(cartScript);

      const checkoutScript = document.createElement("script");
      checkoutScript.src = "assets/js/checkout-page.js";
      document.body.appendChild(checkoutScript);
    }

    loadCheckoutComponents();
  </script>

</body>

</html>
